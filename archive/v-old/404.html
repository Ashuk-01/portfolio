<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Ashu Kaur</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAFAF7;
      --olive-deep: #556B2F;
      --olive-sage: #6B7F5E;
      --text-primary: #1C1C1A;
      --text-secondary: #5A5A55;
      --text-tertiary: #9A9A93;
      --font-display: 'Lora', serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: var(--olive-sage);
      color: #FAFAF7;
    }

    .code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .message {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-style: italic;
      color: var(--text-secondary);
      margin-top: 1rem;
      max-width: 400px;
    }

    .back {
      display: inline-block;
      margin-top: 2.5rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--olive-deep);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.7rem 1.6rem;
      border: 1px solid rgba(85,107,47,0.3);
      border-radius: 100px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .back:hover {
      background: var(--olive-deep);
      color: var(--bg);
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H82NT92R7N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-H82NT92R7N");
  </script>
</head>
<body>
  <p class="code">404</p>
  <p class="message">This page wandered off somewhere. Let's get you back.</p>
  <a href="/" class="back">Back to home</a>
</body>
</html>
